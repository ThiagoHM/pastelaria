services:
  - type: web
    name: pastelaria-recanto-api
    runtime: node
    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/store/settings
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_TEST_PAYER_EMAIL
        value: comprador.recanto.qa@gmail.com
