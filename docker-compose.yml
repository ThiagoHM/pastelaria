services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pastelaria_recanto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pastelaria_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pastelaria_recanto"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pastelaria_postgres:
